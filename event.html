<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>velometeo</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="page">
  <header class="hero">
    <div class="topbar">
      <div class="controls">
        <nav class="lang">
          <a href="index.html" data-i18n="back.index">Toate evenimentele</a>
        </nav>
        <div class="settings">
          <button class="theme-toggle" type="button" data-settings-toggle aria-expanded="false" aria-label="Settings">⚙️</button>
          <div class="settings-panel" data-settings-panel hidden>
            <nav class="lang">
              <a href="#" data-lang="ro">RO</a>
              <a href="#" data-lang="en">EN</a>
              <a href="#" data-lang="ru">RU</a>
            </nav>
            <button class="theme-toggle" type="button" data-theme-toggle>🌙</button>
          </div>
        </div>
      </div>
    </div>
    <h1 data-event-name>…</h1>
    <div class="meta">
      <span class="pill"><span data-i18n="event.date">Data</span>: <b data-event-date>—</b></span>
      <span class="pill"><span data-i18n="event.start">Start</span>: <b data-event-start>—</b></span>
      <span class="pill"><span data-i18n="event.distance">Distanta</span>: <b data-event-distance>—</b></span>
      <span class="pill" data-event-checkpoints><span data-i18n="event.checkpoints">Puncte de control</span>: <b>—</b></span>
    </div>
    <div class="update-info" data-event-status></div>
    <div class="update-info" data-model-switcher></div>
  </header>

  <section class="section" data-scenarios>
    <div class="note" data-i18n="event.loading">Se incarca...</div>
  </section>

  <section class="section sources">
    <h2 data-i18n="notes.title">Note tehnice</h2>
    <p data-i18n="notes.data"></p>
  </section>

</div>
<script src="assets/js/theme.js" defer></script>
<script src="assets/js/settings.js" defer></script>
<script type="module" src="assets/js/event-page.js"></script>
</body>
</html>
